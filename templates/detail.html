<!DOCTYPE html>
<html>
<head>
    <title>{{ movie.title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0a0a; color: white; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .back-link { color: #e50914; text-decoration: none; font-size: 18px; display: inline-block; margin-bottom: 15px; }
        .back-link:hover { text-decoration: underline; }
        .video-container { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            border-radius: 10px;
            background: #111;
        }
        .video-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        .info { 
            margin: 20px 0; 
            background: #1a1a1a; 
            padding: 20px; 
            border-radius: 10px; 
        }
        .info h1 { margin-bottom: 10px; font-size: 28px; }
        .info .rating { color: #ffd700; }
        .info .overview { margin-top: 10px; line-height: 1.6; color: #ccc; }
        .info .year { color: #888; font-size: 14px; margin-left: 10px; }
        .watch-status {
            background: #2a2a2a;
            padding: 10px 15px;
            border-radius: 5px;
            margin: 15px 0;
            border-left: 4px solid #e50914;
            font-size: 14px;
        }
        .continue-btn {
            background: #e50914;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        .continue-btn:hover { background: #b20710; }
        .clear-btn {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .clear-btn:hover { background: #555; }
        @media (max-width: 600px) {
            .info h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Home</a>
        
        <!-- Watch Status -->
        <div class="watch-status" id="watchStatus">
            <p id="watchMessage">Loading your watch history...</p>
            <div id="continueButtons">
                <button class="continue-btn" id="continueBtn" onclick="continueWatching()" style="display:none;">
                    ▶️ Continue Watching
                </button>
                <button class="clear-btn" onclick="clearHistory()" style="display:none;">
                    🗑️ Clear History
                </button>
            </div>
        </div>
        
        <!-- Video Player -->
        <div class="video-container">
            <iframe id="videoPlayer" src="{{ video_url }}" allowfullscreen></iframe>
        </div>
        
        <!-- Movie Info -->
        <div class="info">
            <h1>
                {{ movie.title }}
                <span class="year">({{ movie.release_date[:4] if movie.release_date else 'N/A' }})</span>
            </h1>
            <p class="rating">⭐ {{ movie.vote_average }}/10</p>
            <p><strong>Release Date:</strong> {{ movie.release_date or 'Unknown' }}</p>
            <p class="overview">{{ movie.overview or 'No description available.' }}</p>
        </div>
    </div>
    
    <script>
        // Get movie details from the page
        const movieId = "{{ movie.id }}";
        const movieTitle = "{{ movie.title }}";
        const moviePoster = "https://image.tmdb.org/t/p/w500{{ movie.poster_path }}";
        
        // ============================================
        // WATCH HISTORY FUNCTIONS
        // ============================================
        
        function getHistory() {
            const history = localStorage.getItem('watchHistory');
            return history ? JSON.parse(history) : {};
        }
        
        function saveHistory(history) {
            localStorage.setItem('watchHistory', JSON.stringify(history));
        }
        
        function updateWatchStatus() {
            const history = getHistory();
            const watchStatus = document.getElementById('watchStatus');
            const watchMessage = document.getElementById('watchMessage');
            const continueBtn = document.getElementById('continueBtn');
            const clearBtn = document.getElementById('clearBtn');
            
            if (history[movieId]) {
                const data = history[movieId];
                const progress = Math.round(data.progress);
                const lastWatched = new Date(data.timestamp).toLocaleDateString();
                
                watchMessage.innerHTML = `
                    📺 <strong>${movieTitle}</strong> - ${progress}% watched<br>
                    <small>Last watched: ${lastWatched}</small>
                `;
                continueBtn.style.display = 'inline-block';
                clearBtn.style.display = 'inline-block';
                clearBtn.setAttribute('onclick', `clearHistory('${movieId}')`);
            } else {
                watchMessage.textContent = 'No watch history for this movie.';
                continueBtn.style.display = 'none';
                clearBtn.style.display = 'none';
            }
        }
        
        function continueWatching() {
            const history = getHistory();
            if (history[movieId]) {
                const data = history[movieId];
                // We need to pass the timestamp to the video player
                // Since we can't directly control external embed, we reload the page with a hash
                window.location.href = window.location.href.split('#')[0] + `#t=${data.timestamp}`;
            }
        }
        
        function clearHistory(movieIdToClear) {
            if (confirm(`Clear watch history for "${movieTitle}"?`)) {
                const history = getHistory();
                delete history[movieIdToClear];
                saveHistory(history);
                updateWatchStatus();
            }
        }
        
        // ============================================
        // SAVE PROGRESS (every 10 seconds)
        // ============================================
        
        // Since we can't control the embed directly, we simulate progress
        // by saving time-based progress
        let startTime = Date.now();
        let isWatching = true;
        
        // Save progress every 10 seconds
        setInterval(() => {
            if (isWatching) {
                const elapsed = (Date.now() - startTime) / 1000; // seconds
                // Simulate progress (max 100% after 2 hours)
                const progress = Math.min((elapsed / 7200) * 100, 99);
                
                const history = getHistory();
                if (!history[movieId] || progress > history[movieId].progress) {
                    history[movieId] = {
                        title: movieTitle,
                        poster: moviePoster,
                        progress: progress,
                        timestamp: Date.now()
                    };
                    saveHistory(history);
                }
            }
        }, 10000); // Every 10 seconds
        
        // Track when the user is actively watching
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isWatching = false;
            } else {
                isWatching = true;
                startTime = Date.now();
            }
        });
        
        // ============================================
        // INITIALIZE
        // ============================================
        
        // Update watch status on page load
        updateWatchStatus();
        
        // If there's a timestamp in the URL, try to seek
        window.onload = function() {
            const hash = window.location.hash;
            if (hash && hash.startsWith('#t=')) {
                const timestamp = parseInt(hash.split('=')[1]);
                // We can't control the embed directly, but we can show a message
                const watchMessage = document.getElementById('watchMessage');
                watchMessage.innerHTML += `<br><small>⏰ Resumed from ${new Date(timestamp).toLocaleTimeString()}</small>`;
            }
        };
    </script>
</body>
</html>
