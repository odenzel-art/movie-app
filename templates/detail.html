<!DOCTYPE html>
<html>
<head>
    <title>{{ movie.title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #111; color: white; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .back-link { color: #e50914; text-decoration: none; font-size: 18px; display: inline-block; margin-bottom: 20px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .info { margin: 20px 0; background: #1a1a1a; padding: 20px; border-radius: 10px; }
        .info h1 { margin-bottom: 10px; }
        .info .rating { color: #ffd700; }
        .info .overview { margin-top: 10px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Home</a>
        <div class="video-container">
            <iframe src="{{ video_url }}" allowfullscreen></iframe>
        </div>
        <div class="info">
            <h1>{{ movie.title }}</h1>
            <p class="rating">⭐ {{ movie.vote_average }}/10</p>
            <p><strong>Release Date:</strong> {{ movie.release_date }}</p>
            <p class="overview">{{ movie.overview }}</p>
        </div>
    </div>
</body>
</html>
