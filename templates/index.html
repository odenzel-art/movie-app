<!DOCTYPE html>
<html>
<head>
    <title>Movie App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #111; color: white; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .search-box { display: flex; gap: 10px; }
        .search-box input { padding: 10px; border: none; border-radius: 5px; width: 250px; }
        .search-box button { padding: 10px 20px; background: #e50914; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .movie-card { background: #1a1a1a; border-radius: 10px; overflow: hidden; transition: transform 0.3s; cursor: pointer; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-card img { width: 100%; height: 280px; object-fit: cover; }
        .movie-card h3 { padding: 10px; font-size: 14px; text-align: center; }
        a { color: white; text-decoration: none; }
        .back-link { color: #e50914; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 Movie App</h1>
        <form class="search-box" action="/search" method="GET">
            <input type="text" name="q" placeholder="Search movies..." required>
            <button type="submit">Search</button>
        </form>
    </div>
    <div class="movie-grid">
        {% for movie in movies %}
        <a href="/movie/{{ movie.id }}">
            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500{{ movie.poster_path }}" alt="{{ movie.title }}">
                <h3>{{ movie.title }}</h3>
            </div>
        </a>
        {% endfor %}
    </div>
    {% if query %}
        <p style="margin-top: 20px;">Results for: "{{ query }}"</p>
    {% endif %}
</body>
</html>
